  url: "{{url}}/employees"
  body: json
  auth: inherit

body:json:
  {
    "name": "Jane Smith",
    "phone": "08987654321",
    "baseSalary": 4500000,
    "pin": "1234"
  }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

