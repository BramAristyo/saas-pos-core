info:
  name: Cash Flow Statement
  type: http
  seq: 2

http:
  method: GET
  url: "{{url}}/ledger/cash-flow"
  auth: inherit

query:
  ~pageNumber: 1
  ~pageSize: 10
  ~filter[transactionDate][type]: inRange
  ~filter[transactionDate][from]: 2026-05-01
  ~filter[transactionDate][to]: 2026-05-31
  ~filter[transactionDate][filterType]: date

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Monthly Cash Flow
    request:
      url: "{{url}}/ledger/cash-flow?filter[transactionDate][type]=inRange&filter[transactionDate][from]=2026-05-01&filter[transactionDate][to]=2026-05-31&filter[transactionDate][filterType]=date"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {
            "success": true,
            "data": {
              "openingBalance": "5000000",
              "totalIncome": "1500000",
              "totalExpense": "200000",
              "cashFlowAmount": "1300000",
              "endingBalance": "6300000",
              "incomes": [
                {
                  "id": "11111111-1111-1111-1111-111111111111",
                  "coaName": "Coffee Sales",
                  "coaType": "Income",
                  "amount": "1500000",
                  "referenceID": "22222222-2222-2222-2222-222222222222",
                  "referenceType": "shifts",
                  "transactionDate": "2026-05-05T10:00:00Z",
                  "createdAt": "2026-05-05T10:05:00Z"
                }
              ],
              "expenses": [
                {
                  "id": "33333333-3333-3333-3333-333333333333",
                  "coaName": "Milk Supply",
                  "coaType": "Expense",
                  "amount": "200000",
                  "referenceID": "44444444-4444-4444-4444-444444444444",
                  "referenceType": "cash_transactions",
                  "transactionDate": "2026-05-05T11:30:00Z",
                  "createdAt": "2026-05-05T11:35:00Z"
                }
              ]
            },
            "message": "Cash flow statement retrieved successfully"
          }
