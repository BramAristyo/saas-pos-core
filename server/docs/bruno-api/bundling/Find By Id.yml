info:
  name: Find By Id
  type: http
  seq: 3

http:
  method: GET
  url: "{{url}}/bundling/{{bundling_id}}"
  auth: inherit

runtime:
  variables:
    - name: bundling_id
      value: 8d8e8652-5f7b-4b4e-888c-48dd1f403f81

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success find bundling by id
    request:
      url: "{{url}}/bundling/00000000-0000-0000-0000-000000000602"
      method: GET
    response:
      status: 200
