info:
  name: Me
  type: http
  seq: 2

http:
  method: GET
  url: "{{url}}/me"
  auth: bearer

auth:
  bearer:
    token: "{{token}}"

runtime:
  variables:
    - name: url
      value: http://localhost:9000/api/v1

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
