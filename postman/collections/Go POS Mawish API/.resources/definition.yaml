$kind: collection
name: Go POS Mawish API
description: |-
  REST API collection for the Go POS Mawish application.
  Built with Gin framework, JWT authentication, PostgreSQL backend.

  Base path: /api/v1
  Auth: Bearer token (JWT) required on all endpoints except Login.
variables:
  - key: base_url
    value: 'http://localhost:9000'
    description: Base URL of the API server
  - key: auth_token
    value: ''
    description: JWT token obtained from the Login endpoint
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{auth_token}}'
