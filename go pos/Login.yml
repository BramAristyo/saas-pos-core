info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/"
  body:
    type: json
    data: |-
      {
        "email": "alice.admin@example.com",
        "password": "password1"
      }
  auth: inherit

runtime:
  variables:
    - name: url
      value: http://localhost:9000/api/v1
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        bru.setEnvVar("token", data.data.token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

