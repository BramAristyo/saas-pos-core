info:
  name: Transactions
  type: http
  seq: 3

http:
  method: GET
  url: "{{url}}/reports/transactions"
  auth: inherit

query:
  ~search: ORD
  ~sort[0][column]: created_at
  ~sort[0][orderBy]: desc
  ~filter[created_at][type]: inRange
  ~filter[created_at][from]: 2026-03-01
  ~filter[created_at][to]: 2026-04-01
  ~filter[created_at][filterType]: date

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
