runtime:
  variables:
    - name: url
      value: http://localhost:9000/api/v1
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        if (data && data.data && data.data.token) {
          bru.setEnvVar("token", data.data.token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
