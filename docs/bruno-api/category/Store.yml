info:
  name: Store
  type: http
  seq: 3

http:
  method: POST
  url: "{{url}}/categories"
  auth: inherit
  body:
    type: json
    data: |-
      {
        "name": "New Category",
        "description": "Description of new category"
      }

examples:
  - name: success create category
    request:
      url: "{{url}}/categories"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "New Category",
            "description": "Description of new category"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {
            "success": true,
            "message": "success create category",
            "data": {
              "id": "f4067b21-522b-5d3e-05e4-d4d3f7e7d4f2",
              "name": "New Category",
              "description": "Description of new category",
              "deleted_at": null,
              "created_at": "2026-03-18 10:30:00"
            }
          }
