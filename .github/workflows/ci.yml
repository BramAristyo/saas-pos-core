name: Go CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install dependencies
        run: go mod tidy

      # - name: Run vet
      #   run: go vet ./...

      # - name: Run test
      #   run: go test ./...

      - name: Build
        run: go build ./cmd/api
